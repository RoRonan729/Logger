name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build shadow JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogStream-${{ github.sha }}
          path: build/libs/LogStream-*.jar

      # Only runs when you push a tag like v1.0.0
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: LogStream ${{ github.ref_name }}
          body: |
            ## LogStream ${{ github.ref_name }}

            Drop `LogStream-*.jar` into your Paper server's `plugins/` folder.

            **Requires:** Paper 1.21+, Java 21
          files: build/libs/LogStream-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
